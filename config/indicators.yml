    es: "Mortalidad Materna (por 100.000 NV)"
    en: "Maternal Mortality Rate (per 100,000 live births)"
  source:
    name: "Mock — San Martín del Valle"
  category: "health/outcomes"
  processing:
    type: "mock"
    script: "src/mock/health/maternal_mortality_rate.R"
  output:
    format: ["csv", "parquet"]
    structure: "long"
    files:
      - "maternal_mortality_rate"
    columns:
      - name: "iso3"
        type: "character"
      - name: "NAME_2"
        type: "character"
      - name: "anio"
        type: "integer"
      - name: "grupo_edad"
        type: "character"
      - name: "zona"
        type: "character"
      - name: "valor"
        type: "numeric"
  updated: "2026-04-16"

