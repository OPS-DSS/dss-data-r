# Municipal Map
huila_map:
  id: "HUILA_MUNICIPAL_MAP"
  names:
    es: "Mapa municipal de Huila - Comparación entre municipios"
    en: "Huila Municipal Map - Inter-municipality comparison"
  source:
    name: "GADM (Global Administrative Areas Database)"
    url: "https://gadm.org/"
  category: "health/spatial"
  processing:
    type: "spatial"
    script: "src/indicators/health/huila_map/huila_map.R"
  output:
    format: ["geojson", "csv"]
    structure: "spatial"
    files:
      - "map_cobertura_bruta"
      - "map_cobertura_neta"
      - "map_desercion"
      - "map_aprobacion"
      - "map_reprobacion"
      - "map_repitencia"
      - "map"
    # CSV columns; GeoJSON features may additionally include GADM attributes
    columns:
      - name: "municipio"
        type: "character"
        description: "Municipality name"
      - name: "cobertura_bruta"
        type: "numeric"
        description: "Gross coverage rate (%)"
      - name: "cobertura_neta"
        type: "numeric"
        description: "Net coverage rate (%)"
      - name: "desercion"
        type: "numeric"
        description: "Dropout rate (%)"
      - name: "aprobacion"
        type: "numeric"
        description: "Pass rate (%)"
      - name: "reprobacion"
        type: "numeric"
        description: "Fail rate (%)"
      - name: "repitencia"
        type: "numeric"
        description: "Repetition rate (%)"
  updated: "2026-03-14"

# Maternal Mortality Rate (mock data for SMV)
